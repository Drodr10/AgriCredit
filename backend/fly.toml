app = "agricredit-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_TITLE = "Agricredit API"
  APP_VERSION = "0.1.0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "connections"
  hard_limit = 50
  soft_limit = 25

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[checks.http]
  type = "http"
  grace_period = "10s"
  interval = "30s"
  method = "get"
  path = "/"
  protocol = "http"
  restart_limit = 3
  timeout = "5s"
